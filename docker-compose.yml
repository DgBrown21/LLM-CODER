version: "3.8"

services:
  ollama:
    # CPU-only by default so this boots on any machine without extra setup.
    # For GPU acceleration, pick ONE of the blocks below for your hardware
    # and uncomment it (leave the other commented out):
    #
    # Nvidia (requires the NVIDIA Container Toolkit on the host):
    #   deploy:
    #     resources:
    #       reservations:
    #         devices:
    #           - driver: nvidia
    #             count: all
    #             capabilities: [gpu]
    #
    # AMD/ROCm (requires /dev/kfd + /dev/dri on the host):
    #   image: ollama/ollama:rocm
    #   devices:
    #     - /dev/kfd
    #     - /dev/dri
    #   group_add:
    #     - video
    #     - render
    image: ollama/ollama:latest
    container_name: llm-coder-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1

  llm-coder:
    build: .
    container_name: llm-coder-app
    restart: unless-stopped
    ports:
      # Localhost-only — this app has no login of its own and exposes code
      # execution (/api/execute) and file write (/api/files/write); binding
      # 0.0.0.0 would put that on the whole LAN with zero authentication.
      - "127.0.0.1:8081:8081"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - projects:/root/Downloads/LLM-CODER

volumes:
  ollama-models:
  projects:
