version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: llm-coder-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=0
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # For AMD GPUs (ROCm), uncomment the lines below and comment the nvidia block above:
    # image: ollama/ollama:rocm
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video
    #   - render

  llm-coder:
    build: .
    container_name: llm-coder-app
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - projects:/root/Downloads/LLM-CODER

volumes:
  ollama-models:
  projects:
